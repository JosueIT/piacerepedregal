<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piacere</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #F9F9F9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #111;
            padding: 20px 0;
        }

        header img {
            width: 160px;
        }

        .container {
            text-align: center;
            padding: 80px 20px;
            max-width: 600px;
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            margin-bottom: 35px;
            color: #555;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            border: 1px solid #111;
            text-decoration: none;
            color: #111;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #111;
            color: white;
        }

        .small {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    <img src="./assets/img/Logotipo_negro_Piacere.png" alt="Piacere">
</header>

<div class="container">
    <h1>Este catálogo ha cambiado</h1>

    <p>
        Hemos actualizado nuestro catálogo.  
        Da clic en el botón para ver la nueva versión.
    </p>

    <!-- 🔥 CAMBIA ESTE LINK -->
    <a href="https://venta-stock-pedregal.netlify.app/" class="btn">
        VER NUEVO CATÁLOGO
    </a>

    <div class="small">
        Serás redirigido automáticamente en unos segundos…
    </div>
</div>

<script>
    // 🔥 redirección automática (opcional)
    setTimeout(() => {
        window.location.href = "https://venta-stock-pedregal.netlify.app/";
    }, 5000);
</script>

</body>
</html>
